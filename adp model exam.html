<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            font-family: Arial;
            background-color: lightblue;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background-color: white;
            width: 250px;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }

        button {
            padding: 8px 15px;
            background-color: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Login Page</h2>

        <form>
            <input type="text" placeholder="Enter email"><br>
            <input type="password" placeholder="Enter password"><br>

            <button>Login</button>
        </form>

        <p>Don't have account? <a href="#">Sign up</a></p>
    </div>

</body>
</html>
